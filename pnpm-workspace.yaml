# Supply-chain guard: refuse dependency versions published in the last 3 days
# (4320 min). Hijacked-package malware is usually caught and unpublished within
# that window, so waiting it out avoids installing a compromised fresh release.
minimumReleaseAge: 4320

# Only these packages may run install/postinstall scripts. Everything else is
# blocked from executing code at install time.
allowBuilds:
  electron: true
  esbuild: true
